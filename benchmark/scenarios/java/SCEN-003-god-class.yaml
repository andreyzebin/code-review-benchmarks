id: SCEN-003
name: "God class, нарушение SRP в Java"
tags: [java, design, srp, severity:medium]

input:
  bitbucket:
    provider: real
    connection:
      base_url: "${BITBUCKET_URL}"
      project: "${BITBUCKET_PROJECT}"
      repo: "${BITBUCKET_REPO}"
      auth:
        env: BITBUCKET_TOKEN
    pull_request:
      from_branch: "feature/PROJ-300-order-management"
      to_branch: "main"
      title: "[BENCHMARK] SCEN-003: God class в OrderService"

  jira:
    base_provider: fixture
    data:
      issue:
        key: "PROJ-300"
        summary: "Реализовать управление заказами"
        description: |
          Реализовать полный цикл работы с заказами: создание, оплата,
          уведомления, управление складом и отчётность.
        issuetype: "Epic"
        status: "In Progress"
        labels: [backend, java, orders]
      comments: []

expected_output:
  required_comments:
    - id: EXP-1
      type: general
      severity: major
      location: null
      description_keywords:
        - ["SRP", "Single Responsibility", "единственная ответственность", "God class", "god object"]
        - ["разделить", "split", "отдельный сервис", "PaymentService", "NotificationService"]
      rationale: |
        OrderService выполняет 5 несвязанных обязанностей: CRUD заказов, оплата,
        email-уведомления, управление складом, отчётность.
        Нарушает SRP — нужно выделить отдельные сервисы.

  forbidden_comments:
    - description: "Замечание к аннотации @Service — она корректна"
    - description: "Замечание к названиям методов — они понятные"

  expected_status_change: "NEEDS_WORK"

  thresholds:
    min_score: 0.60
    min_required_found: 1
    max_false_positives: 4

metadata:
  difficulty: hard
  language: java
  pr_size: medium
  scenario_type: design
  author: "team"
  created: "2024-01-15"
