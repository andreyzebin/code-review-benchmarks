id: SCEN-302
name: "Two-round review: agent reviews fix push after own prior comments"
tags: [java, incremental, two-round, refs-update, severity:major, cost:expensive]

# Two-round incremental review. Until the bench-side BranchUpdater
# (see TODO marker at the end of this file) is implemented, only round
# 1 actually fires — `setup.refs_update` and `trigger.rounds` are
# silently ignored by the current loader, so the agent reviews step0
# (the buggy commit) and the round-2 forbidden_comments check
# legitimately fails. Companion to the cheaper SCEN-300/301 which
# fake the prior round via seed_comments.

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "hotfix/ORD-287-cancel-npe-step0"
      to_branch: "master"
      title: "[BENCHMARK] SCEN-302: Fix NPE on order cancellation (ORD-287)"
      description: |
        ## ORD-287: NPE on order cancellation when items list is null

        **Incident:** Production NPE in `cancelOrder()` when iterating
        `order.getItems()` for orders created via the legacy import script.

        ### First attempt
        Initial fix: wrap items iteration in null guard.

  setup:
    # No seed_comments — round 1 produces the comments that round 2 must
    # acknowledge. The agent's own outputs become the prior round.
    seed_comments: []

    # NEW field, requires bench-side support (BranchUpdater).
    # After round 1 completes, bench pushes a second commit to the source
    # branch (rebase or fast-forward to *_step1 branch). The PR diff updates;
    # then round 2 fires.
    refs_update:
      after_round: 1
      strategy: "fast-forward"      # or "force-push" — chooses how to update
      target_ref: "hotfix/ORD-287-cancel-npe-step1"

  trigger:
    # Round 1 — first /review. Round 2 fires automatically after the refs
    # update (bench reposts /review on the updated PR).
    type: comment
    text: "/review"
    rounds: 2     # NEW: number of /review fires

expected_output:
  # Two-round expectations — judge looks at round-2 comments only, but with
  # access to round-1 comments as "prior context".
  round: 2

  required_comments:
    # Round 2 should NOT re-flag the null-guard concern (the fix is in step1).
    # If the agent has nothing new to say, that's still a pass — see thresholds.
    []

  forbidden_comments:
    - description: "Re-flagging the null guard / null check on cancelOrder() — the step1 commit added it"
    - description: "Asking the author to consider null safety on the same loop"

  expected_status_change: "APPROVED"

  thresholds:
    min_score: 0.60
    min_required_found: 0      # round 2 may legitimately produce no new findings
    max_false_positives: 1

metadata:
  difficulty: hard
  language: java
  pr_size: small
  scenario_type: incremental_review
  capabilities: [incremental_review, refs_update, two_round, root_cause_analysis]
  status: "DRAFT — requires bench BranchUpdater"
  author: "team"
  created: "2026-05-05"

