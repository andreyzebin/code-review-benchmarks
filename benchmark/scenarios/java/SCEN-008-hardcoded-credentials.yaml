id: SCEN-008
name: "Хардкод credentials в Java"
tags: [java, security, credentials, severity:critical]

input:
  bitbucket:
    base_provider: fixture
    data:
      pull_request:
        id: 122
        title: "PROJ-800: Add S3 file upload service"
        description: "Implements file upload to AWS S3"
        author: { name: "frank.castle", display_name: "Frank Castle" }
        from_branch: "feature/PROJ-800-s3-upload"
        to_branch: "main"
        status: "OPEN"
        head_commit: "aabbcc112233"

      diff:
        - path: "src/main/java/com/example/S3UploadService.java"
          change_type: ADD
          hunks:
            - old_start: 0
              new_start: 1
              lines:
                - "+@Service"
                - "+public class S3UploadService {"
                - "+"
                - "+    private static final String ACCESS_KEY = \"AKIAIOSFODNN7EXAMPLE\";"
                - "+    private static final String SECRET_KEY = \"wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY\";"
                - "+    private static final String BUCKET = \"prod-uploads-bucket\";"
                - "+"
                - "+    private final AmazonS3 s3Client;"
                - "+"
                - "+    public S3UploadService() {"
                - "+        BasicAWSCredentials creds = new BasicAWSCredentials(ACCESS_KEY, SECRET_KEY);"
                - "+        this.s3Client = AmazonS3ClientBuilder.standard()"
                - "+            .withCredentials(new AWSStaticCredentialsProvider(creds))"
                - "+            .withRegion(Regions.EU_WEST_1)"
                - "+            .build();"
                - "+    }"
                - "+"
                - "+    public String uploadFile(MultipartFile file) throws IOException {"
                - "+        String key = UUID.randomUUID() + \"/\" + file.getOriginalFilename();"
                - "+        s3Client.putObject(BUCKET, key, file.getInputStream(), new ObjectMetadata());"
                - "+        return key;"
                - "+    }"
                - "+}"

      codebase_context:
        - path: "src/main/resources/application.properties"
          content: |
            spring.application.name=myapp
            server.port=8080
            # AWS credentials should be configured via environment or IAM role

  jira:
    base_provider: fixture
    data:
      issue:
        key: "PROJ-800"
        summary: "Сервис загрузки файлов в AWS S3"
        description: |
          Реализовать загрузку файлов в S3.
          Использовать bucket prod-uploads-bucket в eu-west-1.
        issuetype: "Task"
        status: "In Progress"
        labels: [backend, java, aws, s3]
      comments: []

expected_output:
  required_comments:
    - id: EXP-1
      type: inline
      severity: critical
      location:
        file: "src/main/java/com/example/S3UploadService.java"
        line: 4
      description_keywords:
        - ["hardcoded", "захардкожен", "credentials", "секрет", "secret", "ключ"]
        - ["environment", "переменная среды", "env", "application.properties", "Secrets Manager", "IAM"]
      rationale: |
        AWS access key и secret key захардкожены в коде.
        Они попадут в git-историю и утекут. Нужно использовать
        переменные среды, IAM role или AWS Secrets Manager.

  forbidden_comments:
    - description: "Замечание к названию бакета — имя определено в задаче"

  expected_status_change: "NEEDS_WORK"

  thresholds:
    min_score: 0.80
    min_required_found: 1
    max_false_positives: 2

metadata:
  difficulty: easy
  language: java
  pr_size: small
  scenario_type: security
  author: "team"
  created: "2024-01-15"
