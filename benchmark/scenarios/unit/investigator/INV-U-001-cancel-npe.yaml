id: INV-U-001-cancel-npe
agent: investigator
tags: [tier:unit, agent:investigator, isolation]

# Per-fixture worker cmd. Falls back to the pool's default if
# empty. {provider} is a worker-side placeholder; the rest is
# verbatim. This is the only place that knows "this fixture runs
# via bench run-unit"; no tier-based dispatch in code.
bench_cmd: >
  cd {bench_root} && source .env
  && unset ALL_PROXY all_proxy
  && .venv/bin/python -m benchmark.cli run-unit
  {fixture_path}
  --provider={provider}

# References real branches in the local orderflow repo. The runner
# `git clone --local --no-hardlinks` orderflow into a tempdir, checks
# out the source branch, resolves the (base, source) SHA pair, and
# invokes diff-graph cli.py against that — all locally. No GitHub /
# Bitbucket calls (avoids API quota / account bans for fixture runs).
repo:
  source: /home/andrey/repos/code-review-examples/orderflow
  base_branch: master
  source_branch: hotfix/ORD-287-cancel-npe

agent_data:
  # NB: don't telegraph the answer. A reviewer's spawn_agent focus
  # would naturally describe the diff shape and the concern; it
  # would NOT name the suspected root cause or recommended fix
  # location ("mapping configuration / persistence layer" / "fix at
  # entity") — those are the investigator's job to derive. Earlier
  # draft of this fixture leaked exactly those phrases, then graded
  # the investigator on finding them; the score was confirming what
  # the focus already said, not measuring root-cause discovery.
  focus: |
    OrderService.cancelOrder() was hitting a NullPointerException on
    `order.getItems()`. The hotfix in this diff wraps that loop in
    `if (order.getItems() != null)`. Investigate whether this is
    the right place and shape of fix, and whether the underlying
    cause is properly understood — or whether something more
    fundamental about the Order entity is going wrong.

# ── Judge (investigator standalone) ──────────────────────────────────────
# Investigator runs its full LOOK→THINK→DONE loop on the given focus.
# It does NOT post to the PR (no spawn, no post_comment). The judge
# scores invocations.json — specifically the done(findings=[...]) call.
# Each required_comments entry's description_keywords are matched
# (AND-of-OR) against the union of finding.{description, location} for
# all findings the investigator produced.
#
# A competent investigator should reach these conclusions on this
# focus + this codebase:
#
#   • The null guard violates AGENTS.md's @OneToMany convention.
#     A focused investigator must read AGENTS.md and connect the rule
#     to this exact line. This is a hard skill the prompt explicitly
#     trains for.
#   • Root cause is upstream — either a broken Hibernate mapping or
#     a non-JPA construction path (raw JDBC import, native query row
#     mapping) that bypasses Hibernate's collection init.
#   • The fix belongs at the entity / upstream construction site —
#     NOT at every consumer of getItems(). NOTE: AGENTS.md's explicit
#     @PostLoad/@PrePersist guidance was added on master AFTER this
#     hotfix branched off, so it is NOT visible to the agent. The
#     reviewer is expected to generalise from the @OneToMany rule
#     that IS on the branch ("doing so hides mapping errors") to
#     "fix at the entity, not at every consumer". Keywords below
#     reflect what's actually citable on this branch.
#   • Off-graph noise: investigator should NOT drift into unrelated
#     subsystems (pricing, store credit, etc.). It stays on this
#     single concern.
#
# assert_via: intended_findings — investigator's done(findings=[...])
# is the canonical output channel for this agent. No PR comments to
# match against.
expected_output:
  assert_via: [intended_findings]
  required_comments:
    - id: agents-md-jpa-violation
      type: inline
      severity: major
      description_keywords: ["AGENTS.md", "@OneToMany", "Hibernate", "null guard", "convention", "never null"]
      rationale: "AGENTS.md explicitly bans null guards on @OneToMany — investigator must surface this as the diff's primary problem."
    - id: root-cause-upstream
      type: inline
      severity: major
      description_keywords: ["root cause", "mapping", "upstream", "non-JPA", "raw JDBC", "import", "construct"]
      rationale: "The null indicates a broken mapping or a non-JPA constructor path. Investigator should point upstream, not at the loop site."
    - id: fix-at-entity
      type: inline
      severity: minor
      description_keywords: ["entity", "boundary", "invariant", "consumer", "upstream"]
      rationale: "Investigator should recommend fixing at the entity / upstream construction site rather than wrapping every consumer in null guards. The @PostLoad/@PrePersist hint isn't on the agent's view of AGENTS.md (added on master after this branch); general reviewing principles (fix the cause, not the symptom) are the actual signal."
  forbidden_comments:
    # Incidental findings ON THE PATH are fine (e.g. while reading the
    # entity/mapping the investigator notices a related JPA quirk, that
    # earns no penalty). What we DO want to penalise is drift into
    # subsystems disconnected from the null-items call/data graph —
    # e.g. opening a separate line of inquiry on pricing, store credit,
    # or controllers. The rule is "off-graph, requires a fresh
    # investigation direction" — not "off-the-direct-line".
    - description: "Findings that open a fresh investigation direction unrelated to the null-items call/data graph (pricing, discounts, store credit, controllers). Incidental findings encountered while reading the entity/mapping ARE allowed — only off-graph drift is penalised."
  side_effects:
    inline_comments: 0
    review_status_change: false
  thresholds:
    # 3 required findings; min_required_found=2 means agent must hit
    # at least two of (jpa-violation, root-cause-upstream, fix-at-entity)
    # to pass. The third is bonus but increases score.
    min_score: 0.55
    min_required_found: 2
    max_false_positives: 1

metadata:
  difficulty: medium
  language: java
  pr_size: small
  scenario_type: agent_unit
  capabilities: [investigator, focus_stability, agents_md_awareness, root_cause]
