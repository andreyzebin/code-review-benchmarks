id: DISP-U-002-greeting-cross-thread
agent: dispatcher
tags: [tier:unit, agent:dispatcher, isolation, no-review-on-greeting, cross-thread-bleed]

# Unit-shape mirror of DISP-002 (scenarios/agents/dispatcher/),
# running on a local clone + fake bitbucket via `bench run-unit`.
#
# Real-world miscue: a user posts "hi!" as a fresh comment on a PR
# that already has a /review comment in another thread, and the
# dispatcher starts a code review. The system prompt is explicit —
# "Only the literal /review command", "Plain text → /ask, never spawn
# reviewer" — but EXISTING COMMENTS still surfaces the sibling
# /review, and weaker models sometimes interpret that as "this is a
# review thread, continue".
#
# This test pins the no-spawn invariant: greeting trigger + /review
# visible in EXISTING COMMENTS → must NOT produce the ack and must
# NOT spawn. The mock is an emergency net — if dispatcher does spawn
# by mistake, the test still produces a clean fail signal via the
# forbidden ack text instead of crashing on MockExhausted.
#
# Pairs with DISP-U-001 (positive case: /review SHOULD spawn).

bench_cmd: >
  cd {bench_root} && source .env
  && unset ALL_PROXY all_proxy
  && .venv/bin/python -m benchmark.cli run-unit
  {fixture_path}
  --provider={provider}

repo:
  source: /home/andrey/repos/code-review-examples/orderflow
  base_branch: master
  source_branch: feature/ORD-234-buy-3-get-1-free

# Emergency-net mock: if the dispatcher mistakenly spawns, the mock
# catches the call so the run completes cleanly and the judge can
# score the PR-side signal. The dispatcher should NEVER consume this
# mock — its presence is purely for graceful degradation.
mocks: ../../../fixtures/mocks/dispatcher-review-spawn.yaml

pr_state:
  metadata:
    title: "ORD-234: Implement buy-3-get-1-free promotions"
    description: |
      ## ORD-234: Implement buy-3-get-1-free promotions

      **As a** marketing manager
      **I want to** configure buy-N-get-1-free promotions per product category
      **So that** we can run campaigns without a deploy
    pr_url: "fake://orderflow/UNIT/repos/orderflow/pull-requests/234"
    bot_user: "diffgraph-bot"
  # /review lives in a parallel thread — visible to the dispatcher via
  # EXISTING COMMENTS but NOT the trigger's own thread. Same shape as
  # the user's reproducer. Comment id=100 lives at parent_id=0 (root)
  # — completely separate from our trigger comment.
  comments:
    # Sibling thread — alice's /review request in a SEPARATE root.
    # The dispatcher must NOT see this when handling the greeting
    # below; if it does, the "no thread crosstalk" invariant breaks.
    - id: 100
      parent_id: 0
      text: "/review"
      author:
        name: "alice"
        slug: "alice"
    # The greeting itself — the trigger comment. Non-zero id so the
    # production dispatcher correctly classifies this as a real
    # comment trigger ("user posted `hi!` and waited for a reply")
    # rather than `comment_id=0` (auto-trigger / CLI / benchmark =
    # the dispatcher's spawn-the-reviewer path). Without the
    # non-zero id qwen3-6 follows the auto-trigger branch verbatim
    # ("call spawn_agent when comment_id is 0") and the test
    # mis-pins a routing decision the production prompt explicitly
    # ASKS for in the auto-trigger case.
    - id: 200
      parent_id: 0
      text: "hi!"
      author:
        name: "alice"
        slug: "alice"

trigger:
  # Real comment trigger (id=200) — not auto-trigger. The
  # dispatcher's "auto-trigger → spawn reviewer" rule must NOT fire
  # because we ARE handling a user-posted comment.
  type: comment
  text: "hi!"
  comment_id: 200

agent_data: {}

# ── Judge — dispatcher must NOT spawn on plain greeting ─────────────────
# assert_via=[pr_comments]: judge reads FakeBenchPRView.get_comments()
# (sink-side post_comment kinds). reply.must_mention covers acceptable
# greet-back text; forbidden_topics flags Starting-review-ack bleeds.
expected_output:
  assert_via: [pr_comments]
  required_comments: []
  forbidden_comments:
    - description: "Any comment beginning with 'Starting review of' / 'Запускаю обзор' / 'Beginning review' — those are the dispatcher's /review-path ack and prove it routed to the reviewer when it shouldn't have."
    - description: "Inline finding comments (file+line+severity) — dispatcher posts none of its own; if any appear, the dispatcher mirrored a (mocked) reviewer's output."

  reply:
    must_mention:
      - ["hi", "hello", "hey", "привет", "здравствуйте", "добрый"]
    must_address: ["greeting", "hi", "hello", "привет"]
    forbidden_topics:
      - ["Starting review", "Запускаю обзор", "Beginning review", "Reviewing the"]
      - ["selectFreeItem", "applyBulkDiscount", "BLOCKER", "MAJOR"]
    rationale: |
      The trigger is a plain greeting, not a /command. The
      dispatcher's prompt says: plain text → /ask path, never spawn
      reviewer. The /review in the parallel thread (visible via
      EXISTING COMMENTS) is someone else's request and must not bleed
      into this trigger's response. Acceptable: a brief greet back,
      optionally a one-liner about the three commands. NOT acceptable:
      starting a review, summarising what /review does as if
      confirming an intent, or treating "hi!" as a question about
      the diff.

  side_effects:
    inline_comments: 0
    review_status_change: false

  thresholds:
    min_score: 0.70
    min_required_found: 0
    max_false_positives: 1
  acknowledgement_required: true

metadata:
  difficulty: easy
  language: any
  pr_size: small
  scenario_type: agent_unit
  capabilities: [dispatcher, no_spawn_on_plain_text, cross_thread_isolation]
