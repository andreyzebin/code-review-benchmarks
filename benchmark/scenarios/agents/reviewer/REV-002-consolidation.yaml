id: REV-002
name: "Reviewer unit — consolidation only (skip LOOK/INVESTIGATE)"
tags: [tier:unit, agent:reviewer, isolation, consolidation]

# Tests the JUDGE phase of the reviewer in isolation. The user
# message overrides the default "Review this PR" with a pre-built
# findings packet from imaginary investigators. The reviewer's
# system prompt (methodology, severity calibration, AGENTS.md rule)
# stays the same — only the task framing in the user message
# changes. The reviewer should:
#   1. Skip LOOK/INVESTIGATE (the user message tells it the work is
#      done).
#   2. Consolidate, dedupe (none here — three distinct issues).
#   3. post_comment for each, on the right file/line with the
#      severity given.
#   4. set_review_status NEEDS_WORK (BLOCKER + MAJOR standing).
#   5. done().
#
# Pairs with REV-001 which tests concern-forming via mocked
# investigator returns. Together they cover the reviewer's two
# distinct responsibilities — same agent, two task framings via
# user-message override.

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "feature/ORD-234-buy-3-get-1-free"
      to_branch: "master"
      title: "[BENCHMARK] REV-002: ORD-234 — buy-3-get-1-free promotion"
      description: |
        ## ORD-234: Implement buy-3-get-1-free promotions

        **As a** marketing manager
        **I want to** configure buy-N-get-1-free promotions per product category
        **So that** we can run campaigns without a deploy

        ### Acceptance criteria
        - When a customer has 4+ items from a promoted category, the **cheapest**
          item is free
        - Discount is shown as a line item labelled with the promotion name
        - Only one promotion applies per category — no stacking
        - Promotion respects `startDate` and `endDate`

  trigger:
    type: auto
    agent: reviewer
    user_message_from: "diffgraph:diffgraph/test_prompts/reviewer/consolidation-buy3get1.md"

expected_output:
  # Consolidation mode: reviewer publishes via post_comment — match
  # against real PR comments.
  assert_via: [pr_comments]
  required_comments:
    - id: cheapest-item
      severity: BLOCKER
      description_keywords: ["cheapest", "selectFreeItem", "get(0)"]
      rationale: "Reviewer publishes the BLOCKER finding from the prefilled packet."
    - id: transactional
      severity: MAJOR
      description_keywords: ["@Transactional", "applyBulkDiscount"]
      rationale: "Reviewer publishes the MAJOR transaction-safety finding."
    - id: lombok
      severity: MINOR
      description_keywords: ["Lombok", "@Data", "manual"]
      rationale: "Reviewer publishes the MINOR Lombok finding."

  forbidden_comments:
    - description: "Findings invented by the reviewer beyond the three prefilled — the user message gave the full set, anything else is fabrication."

  expected_status_change: "NEEDS_WORK"

  thresholds:
    min_score: 0.70
    min_required_found: 3
    max_false_positives: 1

metadata:
  difficulty: easy
  language: java
  pr_size: medium
  scenario_type: agent_unit
  capabilities: [reviewer, consolidation, severity_preservation]
