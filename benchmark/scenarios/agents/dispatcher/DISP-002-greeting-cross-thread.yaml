id: DISP-002
name: "Dispatcher unit — plain greeting must not spawn reviewer just because /review exists elsewhere on the PR"
tags: [tier:unit, agent:dispatcher, isolation, no-review-on-greeting, cross-thread-bleed]

# Real-world miscue: a user posts "hi!" as a fresh comment on a PR
# that already has a /review comment in another thread, and the
# dispatcher starts a code review. The system prompt is explicit —
# "Only the literal /review command", "Plain text → /ask, never spawn
# reviewer" — but EXISTING COMMENTS still surfaces the sibling
# /review, and weaker models sometimes interpret that as "this is a
# review thread, continue".
#
# This test pins down the no-spawn invariant: a friendly greeting
# (no /command, with a /review visible in EXISTING comments) must
# not produce the "Starting review of …" ack and must not call
# spawn_agent. The mock is an emergency net — if the dispatcher does
# spawn by mistake, the test still produces a clean fail signal via
# the forbidden ack text instead of crashing on MockExhausted.
#
# Pairs with DISP-001 (positive case: /review SHOULD spawn).

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "feature/ORD-234-buy-3-get-1-free"
      to_branch: "master"
      title: "[BENCHMARK] DISP-002: ORD-234 — buy-3-get-1-free promotion"
      description: |
        ## ORD-234: Implement buy-3-get-1-free promotions

        **As a** marketing manager
        **I want to** configure buy-N-get-1-free promotions per product category
        **So that** we can run campaigns without a deploy

        ### Acceptance criteria
        - When a customer has 4+ items from a promoted category, the **cheapest**
          item is free
        - Discount is shown as a line item labelled with the promotion name

  setup:
    # If the dispatcher mistakenly spawns, this catches the call so
    # the run completes cleanly and the judge can score the PR-side
    # signal. The dispatcher should NEVER consume this mock — its
    # presence is purely for graceful degradation under regression.
    mocks: "../../../fixtures/mocks/dispatcher-review-spawn.yaml"
    # The /review lives in a parallel thread — visible to the
    # dispatcher via EXISTING COMMENTS but NOT the trigger's own
    # thread. Same shape as the user's reproducer.
    seed_comments:
      - "/review"

  trigger:
    # Fresh root comment, plain text — neither @mention nor /command.
    # in_reply_to omitted = posted as a new root comment, so the
    # trigger thread does not contain the /review.
    type: comment
    text: "hi!"

expected_output:
  assert_via: [pr_comments]
  required_comments: []
  forbidden_comments:
    - description: "Any comment beginning with 'Starting review of' / 'Запускаю обзор' / 'Beginning review' — those are the dispatcher's /review-path ack and prove it routed to the reviewer when it shouldn't have."
    - description: "Inline finding comments (file+line+severity) — dispatcher posts none of its own; if any appear, the dispatcher mirrored a (mocked) reviewer's output."

  reply:
    # The right answer is a brief, friendly response to the greeting.
    # We don't pin one specific phrase — accept English or Russian,
    # accept "hi" / "hello" / "привет" / "здравствуйте".
    must_mention:
      - ["hi", "hello", "hey", "привет", "здравствуйте", "добрый"]
    must_address: ["greeting", "hi", "hello", "привет"]
    forbidden_topics:
      # The dispatcher must not say it's starting a review, must not
      # describe the review process, must not enumerate reviewer
      # findings.
      - ["Starting review", "Запускаю обзор", "Beginning review", "Reviewing the"]
      - ["selectFreeItem", "applyBulkDiscount", "BLOCKER", "MAJOR"]
    rationale: |
      The trigger is a plain greeting, not a /command. The
      dispatcher's prompt says: plain text → /ask path, never spawn
      reviewer. The /review in the parallel thread (visible via
      EXISTING COMMENTS) is someone else's request and must not bleed
      into this trigger's response. Acceptable replies: a brief greet
      back, optionally a one-liner about the three commands. NOT
      acceptable: starting a review, summarising what /review does as
      if confirming an intent, or treating "hi!" as a question about
      the diff.

  side_effects:
    inline_comments: 0
    review_status_change: false

  thresholds:
    min_score: 0.70
    # The greeting reply itself isn't a "required finding" — count it
    # zero so the only failure mode is via forbidden_comments / reply
    # constraints.
    min_required_found: 0
    max_false_positives: 1
  acknowledgement_required: true

metadata:
  difficulty: easy
  language: any
  pr_size: small
  scenario_type: agent_unit
  capabilities: [dispatcher, no_spawn_on_plain_text, cross_thread_isolation]
