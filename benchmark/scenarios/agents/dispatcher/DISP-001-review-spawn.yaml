id: DISP-001
name: "Dispatcher unit — /review spawns reviewer, ack reply, no finding mirror"
tags: [tier:unit, agent:dispatcher, isolation, mocked-reviewer]

# Unit test of the dispatcher's /review handling. The reviewer is
# mocked, so the dispatcher's job reduces to:
#   1. Acknowledge the trigger comment briefly ("Starting review...").
#   2. spawn_agent("reviewer") exactly once.
#   3. NOT restate the reviewer's findings in its own reply or done()
#      (the reviewer publishes them itself; mirroring would double
#      every comment on the PR).
#   4. Finish via done() with no findings list.
#
# Cheap because the heavy reviewer + investigator chain is replaced
# by a single canned response.

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "feature/ORD-234-buy-3-get-1-free"
      to_branch: "master"
      title: "[BENCHMARK] DISP-001: ORD-234 — buy-3-get-1-free promotion"
      description: |
        ## ORD-234: Implement buy-3-get-1-free promotions

        **As a** marketing manager
        **I want to** configure buy-N-get-1-free promotions per product category
        **So that** we can run campaigns without a deploy

        ### Acceptance criteria
        - When a customer has 4+ items from a promoted category, the **cheapest**
          item is free
        - Discount is shown as a line item labelled with the promotion name
        - Only one promotion applies per category — no stacking
        - Promotion respects `startDate` and `endDate`

  setup:
    mocks: "../../../fixtures/mocks/dispatcher-review-spawn.yaml"

  trigger:
    # /review fired as a root comment — dispatcher path, mocks
    # short-circuit the reviewer spawn.
    type: comment
    text: "/review"

expected_output:
  required_comments: []          # dispatcher itself doesn't post findings
  forbidden_comments:
    - description: "Inline finding comments posted by the dispatcher — those are the reviewer's job. The dispatcher should only post a brief ack reply."

  reply:
    must_mention:
      - ["Starting review", "Запускаю обзор", "Beginning review", "Reviewing"]
    must_address: ["review"]
    forbidden_topics:
      # Don't mirror the reviewer's findings into the ack reply.
      - ["selectFreeItem", "applyBulkDiscount", "BLOCKER", "MAJOR", "@Transactional", "Lombok"]
    rationale: |
      The dispatcher must acknowledge the /review request in the
      thread but MUST NOT restate the reviewer's findings — those
      are already posted by the reviewer subagent itself.
      Re-posting them in the ack would double every comment.

  side_effects:
    inline_comments: 0           # dispatcher posts no inline comments of its own
    review_status_change: false  # dispatcher doesn't change PR status

  thresholds:
    min_score: 0.70
  acknowledgement_required: true

metadata:
  difficulty: easy
  language: any
  pr_size: small
  scenario_type: agent_unit
  capabilities: [dispatcher, review_dispatch, ack_reply, no_finding_mirror]
