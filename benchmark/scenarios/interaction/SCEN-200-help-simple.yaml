id: SCEN-200
name: "/help on a fresh PR — list supported commands"
tags: [interaction, help, severity:none, tier:integration]

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "hotfix/ORD-287-cancel-npe"
      to_branch: "master"
      title: "[BENCHMARK] SCEN-200: Fix NPE on order cancellation (ORD-287)"
      description: |
        ## ORD-287: NPE on order cancellation when items list is null

        **Incident:** Production NPE in `cancelOrder()` when iterating
        `order.getItems()` for orders created via the legacy import path
        (items=null instead of empty list).

        ### Fix
        Added a null guard before iterating items in `cancelOrder()`.

        ### Acceptance criteria
        - `cancelOrder()` no longer throws NPE when items is null
        - Existing cancellation behaviour unchanged for normal orders

  trigger:
    type: comment
    text: "/help"

expected_output:
  reply:
    must_mention:
      - ["/review"]
      - ["/ask"]
      - ["/help"]
    must_address: ["available", "supported", "commands"]
    forbidden_topics:
      - ["null", "items"]              # must not start reviewing the diff
      - ["finding", "MAJOR", "BLOCKER"]
    rationale: |
      The dispatcher should reply in-thread listing the three supported
      commands. It must not invoke the reviewer, post inline comments, or
      change PR status.

  side_effects:
    inline_comments: 0
    review_status_change: false

  thresholds:
    min_score: 0.70

metadata:
  difficulty: easy
  language: any
  pr_size: small
  scenario_type: interaction
  capabilities: [dispatcher, help]
