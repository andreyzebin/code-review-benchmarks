id: SCEN-204
name: "Multi-thread comprehension — answer the thread you were pinged in, not a sibling"
tags: [interaction, ask, thread, multi-thread, crosstalk, tier:integration]

# Reproducer for the thread-crosstalk bug observed in production:
# the agent posts its reply in the right thread (correct parent_id)
# but the content matches a sibling thread on the same PR. The agent
# only answers correctly when the question is unambiguous; with a
# short ambiguous question ("что об этом думаешь?") it drifts into
# whichever sibling thread has higher semantic similarity.
#
# To prove the fix we plant THREE distinct inline-style threads with
# clearly different topics, then ask the same intentionally bland
# question in one of them. The agent must answer about THAT thread's
# topic — the bait words are deliberately not in the question itself.

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "feature/ORD-234-buy-3-get-1-free"
      to_branch: "master"
      title: "ORD-234: Buy-3-get-1-free promotion"
      description: |
        ## ORD-234: Implement buy-3-get-1-free promotions

        **As a** marketing manager
        **I want to** configure buy-N-get-1-free promotions per product category
        **So that** we can run campaigns without a deploy

        ### Acceptance criteria
        - When a customer has 4+ items from a promoted category, the cheapest
          item is free
        - Discount is shown as a line item labelled with the promotion name
        - Only one promotion applies per category — no stacking
        - Promotion respects `startDate` and `endDate`

  setup:
    seed_comments:
      # Three sibling thread roots, each on a clearly different topic.
      # All three are posted as general (non-anchored) comments because
      # the bench currently can't seed inline anchors — the test still
      # works because the agent reads them via existing_comments and
      # the active-thread chain is the trigger thread only.

      # Thread A — pricing logic.
      - text: "[bot] **Free item selection picks the first item, not the cheapest** — `selectFreeItem` in PricingService returns `group.get(0)`. Per the ticket AC the customer should get the cheapest item free, otherwise we silently overcharge them."

      # Thread B — transaction safety. Wholly different topic from A.
      - text: "[bot] **Missing @Transactional on applyBulkDiscount** — the method writes to `orderItemRepository` then `orderRepository` outside a transaction. Partial failures leave items discounted but order totals stale. Every other multi-write method in the codebase is `@Transactional`."

      # Thread C — code style. Wholly different from A and B.
      - text: "[bot] **Promotion entity uses manual getters/setters instead of Lombok** — every other entity in the codebase uses `@Data @Builder @NoArgsConstructor @AllArgsConstructor`. Inconsistency makes future maintenance harder."

  trigger:
    # Bait the agent INSIDE thread A. The question is intentionally
    # short and topic-free — only thread A's content can answer it
    # correctly. A reply that talks about @Transactional or Lombok
    # has crosstalked into thread B or C.
    type: comment
    in_reply_to: [0]
    text: "/ask что об этом думаешь?"

expected_output:
  reply:
    must_mention:
      # Topic of thread A — what the trigger is actually about.
      - ["cheapest", "lowest price", "minimum price", "cheapest item"]
      - ["selectFreeItem", "free item", "get(0)", "first item"]
      # Some explicit answer to the question (yes / agree / serious / etc).
      - ["yes", "agree", "right", "correct", "indeed", "important", "real"]
    must_address: ["yes", "no", "agree", "right", "correct", "important"]
    forbidden_topics:
      # Pulling content from sibling thread B (transaction safety) is
      # the crosstalk failure mode.
      - ["@Transactional", "transaction boundary", "applyBulkDiscount", "atomic"]
      # Pulling content from sibling thread C (Lombok code style).
      - ["Lombok", "@Data", "@Builder", "manual getters"]
    rationale: |
      The agent was pinged inside thread A (selectFreeItem / cheapest
      item). It must reason about A's content. Threads B and C exist
      on the same PR but are background noise — quoting them in the
      reply is exactly the thread-crosstalk bug observed in
      SBLOOM/mediaplanner#81 (production). The trigger phrasing
      ("что об этом думаешь?") is deliberately topic-free so the
      agent can't answer by string-matching the question — it has
      to follow `parent_id` semantics.

  side_effects:
    inline_comments: 0
    review_status_change: false

  thresholds:
    min_score: 0.65
  acknowledgement_required: false

metadata:
  difficulty: hard
  language: any
  pr_size: small
  scenario_type: interaction
  capabilities: [dispatcher, ask, thread-focus, crosstalk-resistance, multi-thread-comprehension]
