id: SCEN-205
name: "Author attribution — list comments belonging to a specific speaker"
tags: [interaction, ask, thread, author-attribution, multi-speaker, tier:integration]

# Tests that the agent treats each speaker in a thread as a separate
# person and can pick out every comment by ONE named speaker — not
# mixing up content from the bot, from its own past reply, or from
# other humans.
#
# The thread is built so alice has TWO non-adjacent comments (a
# position and a clarification), interleaved with comments from
# bot, the agent (tagged [SELF]), and bob. The trigger asks
# specifically: "which comments in this thread belong to alice?".
# A correct answer must:
#   — list both alice comments (or describe their content);
#   — count them as two;
#   — not attribute bot's bug report, the agent's own opinion, or
#     bob's verdict to alice.

input:
  bitbucket:
    provider: real
    pull_request:
      from_branch: "feature/ORD-234-buy-3-get-1-free"
      to_branch: "master"
      title: "ORD-234: Buy-3-get-1-free promotion"
      description: |
        ## ORD-234: Implement buy-3-get-1-free promotions

        **As a** marketing manager
        **I want to** configure buy-N-get-1-free promotions per product category
        **So that** we can run campaigns without a deploy

        ### Acceptance criteria
        - When a customer has 4+ items from a promoted category, the cheapest
          item is free
        - Discount is shown as a line item labelled with the promotion name

  setup:
    seed_comments:
      # Single thread, five nested replies. Speakers are simulated via
      # [tag] prefix matched by --subject-pattern; tuz_spasibo__qodo is
      # the agent's bot_user (rendered with [SELF]).
      #
      # alice appears TWICE (positions 1 and 3 below) with distinct
      # content; the agent must pick out both.

      - text: "[bot] **Free item selection picks the first item, not the cheapest** — `selectFreeItem` in PricingService returns `group.get(0)`. Per the ticket AC the customer should get the cheapest item free."
        replies:
          - text: "[alice] Стоп. Я как PM возражаю. Для маркетинговых кампаний важнее предсказуемость выбора, а не минимальная цена. Покупатели путаются, когда бесплатным становится случайный самый дешёвый — давайте оставим первый элемент."
            replies:
              - text: "[tuz_spasibo__qodo] Не согласен с alice — AC прямо говорит «cheapest». Технически правильное решение: сортировать по `unitPrice` по возрастанию и брать первый. Иначе мы скрытно нарушаем требование тикета."
                replies:
                  - text: "[alice] Уточню тогда: AC в тикете специально упрощены под первый запуск кампании. Полная логика «cheapest per promotion config» появится во второй итерации, в этом тикете она не нужна."
                    replies:
                      - text: "[bob] Принимаю аргумент alice как тимлид. Оставляем `get(0)` в этом PR, заводим follow-up на ORD-241 для cheapest-логики."

  trigger:
    # Reply at depth 5 (root → alice → SELF → alice → bob → trigger).
    type: comment
    in_reply_to: [0, 0, 0, 0, 0]
    text: "/ask какие комментарии в этом треде принадлежат alice?"

expected_output:
  reply:
    must_mention:
      # Alice's first position — about marketing/predictability.
      - ["предсказуем", "predictab", "маркетинг", "marketing", "первый элемент", "first element", "first-in-list"]
      # Alice's second comment — clarification about simplified AC.
      - ["AC", "упрощ", "simplified", "первый запуск", "first launch", "вторая итерация", "second iteration", "follow-up"]
      # Recognises there are TWO alice comments (or names alice as having
      # multiple positions / both messages).
      - ["два", "две", "2", "two", "оба", "both", "обе", "несколько", "multiple"]
    must_address: ["alice"]
    forbidden_topics:
      # Attributing the bot's bug report to alice is the failure mode.
      - ["alice raised the bug", "alice сообщила о баге", "alice пожаловалась на selectFreeItem", "alice noted the issue with get(0)"]
      # Attributing the agent's own opinion to alice.
      - ["alice предложила сортировать", "alice suggested sorting", "alice wanted unitPrice ascending"]
      # Attributing bob's verdict to alice.
      - ["alice approved keeping", "alice as tech lead", "alice одобрила", "alice as тимлид"]
    rationale: |
      The thread contains five comments by four distinct speakers:
      bot (#1, raised the bug), alice (#2, position), agent SELF
      (#3, agent's prior opinion), alice again (#4, clarification),
      bob (#5, verdict). The trigger asks specifically which
      comments belong to alice. A correct answer must enumerate
      both alice messages (#2 and #4) — by id, by content summary,
      or by counting them as two — and must NOT roll bot's,
      agent's, or bob's content into alice's column. The bench
      simulates separate speakers via [name] prefix; in production
      this would be separate Bitbucket accounts, but the agent's
      side of the abstraction is identical (THREAD shows
      `by [name] [SELF?]` headers per comment regardless of which
      mode is in use).

  side_effects:
    inline_comments: 0
    review_status_change: false

  thresholds:
    min_score: 0.65
  acknowledgement_required: false

metadata:
  difficulty: hard
  language: any
  pr_size: small
  scenario_type: interaction
  capabilities: [dispatcher, ask, thread-focus, author-attribution, multi-speaker, self-recognition]
